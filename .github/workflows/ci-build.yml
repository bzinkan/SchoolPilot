name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  backend:
    name: Backend (TypeScript + Build)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Audit dependencies
        run: npm audit --audit-level=high

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

  cross-tenant-tests:
    name: Cross-tenant isolation tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: test
          POSTGRES_DB: sptest
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgres://postgres:test@localhost:5432/sptest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Create test schema
        run: npx drizzle-kit push --force

      - name: Build
        run: npm run build

      - name: Cross-tenant isolation tests
        run: npm test

  frontend:
    name: Frontend (Vite Build)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install backend deps
        run: npm ci

      - name: Install frontend deps
        working-directory: schoolpilot-app
        run: npm ci

      - name: Audit frontend dependencies
        working-directory: schoolpilot-app
        run: npm audit --audit-level=high

      - name: Lint frontend
        working-directory: schoolpilot-app
        run: npm run lint

      - name: Build frontend
        working-directory: schoolpilot-app
        run: npm run build

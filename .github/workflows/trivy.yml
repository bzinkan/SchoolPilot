name: Trivy Container Scan

# Free container vulnerability scanning. Builds the production Docker image and
# scans it for OS-level CVEs (Alpine packages) and language vulnerabilities.
# Runs on every push to main and weekly to catch new advisories on existing images.
#
# NOTE: this repo is private on a plan without code scanning, so there is no
# Security tab. Findings print as a table in the job log and FAIL the job
# (fixable CRITICAL/HIGH only). SOC 2 evidence: "we scan container images and
# block on fixable critical/high vulnerabilities".

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    paths:
      - 'Dockerfile'
      - 'package*.json'
      - '.github/workflows/trivy.yml'
  schedule:
    - cron: '0 7 * * 1' # Mondays 07:00 UTC

jobs:
  scan:
    name: Scan Docker image
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v7

      - name: Build image
        run: docker build -t schoolpilot-production-api:scan .

      - name: Run Trivy
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: 'schoolpilot-production-api:scan'
          format: 'table' # results go to the job log — there is no Security tab on this plan
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: true # only flag CVEs with available fixes
          exit-code: '1' # fail the job on findings

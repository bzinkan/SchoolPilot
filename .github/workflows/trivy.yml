name: Trivy Container Scan

# Free container vulnerability scanning. Builds the production Docker image and
# scans it for OS-level CVEs (Alpine packages) and language vulnerabilities.
# Runs on every push to main and weekly to catch new advisories on existing images.
#
# Findings become SOC 2 evidence ("we scan container images for vulnerabilities").

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    paths:
      - 'Dockerfile'
      - 'package*.json'
      - '.github/workflows/trivy.yml'
  schedule:
    - cron: '0 7 * * 1' # Mondays 07:00 UTC

jobs:
  scan:
    name: Scan Docker image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build -t schoolpilot-production-api:scan .

      - name: Run Trivy
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: 'schoolpilot-production-api:scan'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: true # only flag CVEs with available fixes
          exit-code: '0' # don't fail the build yet — surface in Security tab first

      - name: Upload SARIF to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'
          category: 'trivy-container'

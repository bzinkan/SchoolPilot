name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  actions: read

jobs:
  backend:
    name: Backend (TypeScript + Build)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Audit dependencies
        run: npm audit --audit-level=high

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

      - name: SOC 2 governance evidence check
        run: npm run soc2:check

      - name: Collect SOC 2 evidence
        if: always()
        env:
          JOB_STATUS: ${{ job.status }}
        run: >
          node scripts/soc2/collect-ci-evidence.mjs
          --job "Backend TypeScript and build"
          --controls "SP-SEC-004"
          --summary "Backend dependency audit, TypeScript check, and production build ran for this commit."

      - name: Upload SOC 2 evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: soc2-evidence-backend
          path: soc2-evidence/
          if-no-files-found: error

  cross-tenant-tests:
    name: Cross-tenant isolation tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: test
          POSTGRES_DB: sptest
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgres://postgres:test@localhost:5432/sptest

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Create test schema
        run: npx drizzle-kit push --force

      - name: Build
        run: npm run build

      - name: Cross-tenant isolation tests
        run: npm test

      - name: Collect SOC 2 evidence
        if: always()
        env:
          JOB_STATUS: ${{ job.status }}
        run: >
          node scripts/soc2/collect-ci-evidence.mjs
          --job "Cross-tenant isolation tests"
          --controls "SP-SEC-002,SP-SEC-004"
          --summary "Cross-tenant isolation regression suite ran against the application storage layer."

      - name: Upload SOC 2 evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: soc2-evidence-cross-tenant
          path: soc2-evidence/
          if-no-files-found: error

  rls-enabled-cross-tenant-tests:
    name: RLS-enabled cross-tenant tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: test
          POSTGRES_DB: sptest
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      ADMIN_DATABASE_URL: postgres://postgres:test@localhost:5432/sptest
      DATABASE_URL: postgres://schoolpilot_rls_test_user:test@localhost:5432/sptest
      RLS_TEST_ROLE: schoolpilot_rls_test_user
      RLS_TEST_PASSWORD: test
      RLS_GUC_ENABLED: "true"
      RLS_ENABLED_TABLES: activity_log,audit_logs,block_lists,bus_routes,classpilot_ai_decisions,classpilot_classroom_states,classpilot_command_targets,classpilot_commands,classroom_course_students,classroom_courses,daily_usage,dashboard_tabs,devices,dismissal_sessions,email_alerts,email_scan_log,error_logs,evidence_artifacts,family_groups,flight_paths,grades,groups,heartbeats,homerooms,import_runs,mailpilot_watches,messages,parent_student,passes,security_events,settings,student_attendance,student_groups,student_safety_cases,student_timeline_events,students,subgroups,teacher_students,teaching_sessions,walker_zones

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Create test schema
        env:
          DATABASE_URL: ${{ env.ADMIN_DATABASE_URL }}
        run: npx drizzle-kit push --force

      - name: Build
        env:
          DATABASE_URL: ${{ env.ADMIN_DATABASE_URL }}
        run: npm run build

      - name: Enable RLS on app tables
        env:
          DATABASE_URL: ${{ env.ADMIN_DATABASE_URL }}
        run: node --import tsx tests/setup-rls-ci.ts

      - name: RLS-enabled cross-tenant isolation tests
        run: node --import tsx --test tests/cross-tenant-isolation.test.ts

      - name: Collect SOC 2 evidence
        if: always()
        env:
          JOB_STATUS: ${{ job.status }}
        run: >
          node scripts/soc2/collect-ci-evidence.mjs
          --job "RLS-enabled cross-tenant tests"
          --controls "SP-SEC-002,SP-SEC-004"
          --summary "RLS-enabled cross-tenant tests ran with a non-superuser database role and tenant-table allowlist."

      - name: Upload SOC 2 evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: soc2-evidence-rls-enabled
          path: soc2-evidence/
          if-no-files-found: error

  frontend:
    name: Frontend (Vite Build)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install backend deps
        run: npm ci

      - name: Install frontend deps
        working-directory: schoolpilot-app
        run: npm ci

      - name: Audit frontend dependencies
        working-directory: schoolpilot-app
        run: npm audit --audit-level=high

      - name: Lint frontend
        working-directory: schoolpilot-app
        run: npm run lint

      - name: Build frontend
        working-directory: schoolpilot-app
        run: npm run build

      - name: Collect SOC 2 evidence
        if: always()
        env:
          JOB_STATUS: ${{ job.status }}
        run: >
          node scripts/soc2/collect-ci-evidence.mjs
          --job "Frontend lint and build"
          --controls "SP-SEC-004"
          --summary "Frontend dependency audit, lint, and production Vite build ran for this commit."

      - name: Upload SOC 2 evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: soc2-evidence-frontend
          path: soc2-evidence/
          if-no-files-found: error

  soc2-deployment-evidence:
    name: SOC 2 deployment evidence
    runs-on: ubuntu-latest
    needs:
      - backend
      - cross-tenant-tests
      - rls-enabled-cross-tenant-tests
      - frontend
    if: always()

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Generate shadow deployment evidence
        env:
          JOB_STATUS: ${{ job.status }}
          CI_JOB_RESULTS: ${{ toJSON(needs) }}
        run: npm run soc2:deployment-evidence

      - name: Upload SOC 2 deployment evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: soc2-evidence-deployment
          path: soc2-evidence/deployments/
          if-no-files-found: error

  soc2-incident-evidence:
    name: SOC 2 incident evidence
    runs-on: ubuntu-latest
    needs:
      - backend
      - cross-tenant-tests
      - rls-enabled-cross-tenant-tests
      - frontend
    if: always()

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Generate incident response evidence
        env:
          JOB_STATUS: ${{ job.status }}
        run: npm run soc2:incident-evidence

      - name: Upload SOC 2 incident evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: soc2-evidence-incidents
          path: soc2-evidence/incidents/
          if-no-files-found: error

  soc2-tenant-isolation-evidence:
    name: SOC 2 tenant isolation evidence
    runs-on: ubuntu-latest
    needs:
      - backend
      - cross-tenant-tests
      - rls-enabled-cross-tenant-tests
      - frontend
    if: always()

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Generate tenant isolation evidence
        env:
          JOB_STATUS: ${{ job.status }}
        run: npm run soc2:tenant-isolation-evidence

      - name: Upload SOC 2 tenant isolation evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: soc2-evidence-tenant-isolation
          path: soc2-evidence/tenant-isolation/
          if-no-files-found: error

  soc2-ai-privacy-evidence:
    name: SOC 2 AI/privacy evidence
    runs-on: ubuntu-latest
    needs:
      - backend
      - frontend
    if: always()

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Generate AI/privacy evidence
        env:
          JOB_STATUS: ${{ job.status }}
        run: npm run soc2:ai-privacy-evidence

      - name: Upload SOC 2 AI/privacy evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: soc2-evidence-ai-privacy
          path: soc2-evidence/ai-privacy/
          if-no-files-found: error

  soc2-approval-queue:
    name: SOC 2 approval queue
    runs-on: ubuntu-latest
    needs:
      - backend
      - cross-tenant-tests
      - rls-enabled-cross-tenant-tests
      - frontend
      - soc2-incident-evidence
      - soc2-tenant-isolation-evidence
      - soc2-ai-privacy-evidence
    if: always()

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Generate local deployment evidence for approval pointers
        env:
          JOB_STATUS: ${{ job.status }}
          CI_JOB_RESULTS: ${{ toJSON(needs) }}
        run: npm run soc2:deployment-evidence

      - name: Generate local incident evidence for approval pointers
        env:
          JOB_STATUS: ${{ job.status }}
        run: npm run soc2:incident-evidence

      - name: Generate local tenant isolation evidence for approval pointers
        env:
          JOB_STATUS: ${{ job.status }}
        run: npm run soc2:tenant-isolation-evidence

      - name: Generate local AI/privacy evidence for approval pointers
        env:
          JOB_STATUS: ${{ job.status }}
        run: npm run soc2:ai-privacy-evidence

      - name: Checkout private SOC 2 evidence repo
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        uses: actions/checkout@v7
        with:
          repository: bzinkan/SchoolPilot-SOC2-Evidence
          token: ${{ secrets.SOC2_EVIDENCE_REPO_TOKEN }}
          path: private-evidence

      - name: Generate private evidence readiness
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        run: npm run soc2:private-evidence-readiness -- --private-dir private-evidence

      - name: Locate private evidence readiness
        id: private_readiness
        shell: bash
        run: |
          readiness_file=""
          if [[ -d soc2-evidence/private-readiness ]]; then
            readiness_file="$(ls -1t soc2-evidence/private-readiness/*.json 2>/dev/null | head -n 1 || true)"
          fi
          echo "readiness_file=${readiness_file}" >> "$GITHUB_OUTPUT"

      - name: Generate SOC 2 approval queue
        shell: bash
        env:
          PRIVATE_READINESS_FILE: ${{ steps.private_readiness.outputs.readiness_file }}
        run: |
          if [[ -n "$PRIVATE_READINESS_FILE" ]]; then
            npm run soc2:approval-queue -- --private-readiness-file "$PRIVATE_READINESS_FILE"
          else
            npm run soc2:approval-queue
          fi

      - name: Locate SOC 2 approval queue
        id: approval_queue
        shell: bash
        run: |
          queue_file="$(ls -1t soc2-evidence/approvals/*.json | head -n 1)"
          echo "queue_file=${queue_file}" >> "$GITHUB_OUTPUT"

      - name: Build SOC 2 approval issue body
        run: >
          npm run soc2:approval-issue --
          --queue-file "${{ steps.approval_queue.outputs.queue_file }}"
          --output soc2-evidence/approvals/github-approval-issue.md

      - name: Open or update SOC 2 approval issue
        if: github.event_name != 'pull_request'
        uses: actions/github-script@v8
        env:
          SOC2_APPROVAL_NOTIFY_USERS: ${{ vars.SOC2_APPROVAL_NOTIFY_USERS }}
          SOC2_APPROVAL_LABEL: ${{ vars.SOC2_APPROVAL_LABEL }}
        with:
          script: |
            const fs = require("fs");
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const title = "SOC 2 approvals pending";
            const body = fs.readFileSync("soc2-evidence/approvals/github-approval-issue.md", "utf8");

            const notifyUsers = (process.env.SOC2_APPROVAL_NOTIFY_USERS || "bzinkan")
              .split(",")
              .map((user) => user.trim().replace(/^@/, ""))
              .filter(Boolean);
            const labelName = (process.env.SOC2_APPROVAL_LABEL || "soc2-approval-needed").trim();

            function approvalIds(markdown) {
              return [...markdown.matchAll(/^###\s+(APPROVAL-[A-Z0-9_.:-]+)/gmi)]
                .map((match) => match[1].toUpperCase())
                .sort();
            }

            function approvalFingerprint(markdown) {
              return approvalIds(markdown).join("|");
            }

            function pendingCount(markdown) {
              const match = markdown.match(/^- Pending approvals:\s*(\d+)/m);
              return Number(match?.[1] || 0);
            }

            function queueId(markdown) {
              const match = markdown.match(/^- Queue ID:\s*(.+)$/m);
              return match?.[1]?.trim() || "unknown";
            }

            async function ensureLabel() {
              if (!labelName) return;
              try {
                await github.rest.issues.getLabel({ owner, repo, name: labelName });
              } catch (error) {
                if (error.status !== 404) throw error;
                try {
                  await github.rest.issues.createLabel({
                    owner,
                    repo,
                    name: labelName,
                    color: "B60205",
                    description: "SOC 2 approval queue needs founder review.",
                  });
                } catch (createError) {
                  if (createError.status !== 422) throw createError;
                }
              }
            }

            async function addNotificationRouting(issueNumber) {
              if (labelName) {
                await ensureLabel();
                await github.rest.issues.addLabels({
                  owner,
                  repo,
                  issue_number: issueNumber,
                  labels: [labelName],
                });
              }

              if (notifyUsers.length) {
                try {
                  await github.rest.issues.addAssignees({
                    owner,
                    repo,
                    issue_number: issueNumber,
                    assignees: notifyUsers,
                  });
                } catch (error) {
                  core.warning(`Could not assign SOC 2 approval issue: ${error.message}`);
                }
              }
            }

            async function removePendingLabel(issueNumber) {
              if (!labelName) return;
              try {
                await github.rest.issues.removeLabel({
                  owner,
                  repo,
                  issue_number: issueNumber,
                  name: labelName,
                });
              } catch (error) {
                if (error.status !== 404) throw error;
              }
            }

            const { data: issues } = await github.rest.issues.listForRepo({
              owner,
              repo,
              state: "open",
              per_page: 100,
            });
            const existing = issues.find((issue) => issue.title === title && !issue.pull_request);
            const previousBody = existing?.body || "";
            const hasNewApprovalSet = approvalFingerprint(previousBody) !== approvalFingerprint(body);
            const approvalsPending = pendingCount(body);
            let issueNumber;

            if (existing) {
              await github.rest.issues.update({
                owner,
                repo,
                issue_number: existing.number,
                body,
              });
              issueNumber = existing.number;
              core.info(`Updated SOC 2 approval issue #${issueNumber}`);
            } else {
              const { data: issue } = await github.rest.issues.create({
                owner,
                repo,
                title,
                body,
              });
              issueNumber = issue.number;
              core.info(`Created SOC 2 approval issue #${issueNumber}`);
            }

            if (approvalsPending > 0) {
              await addNotificationRouting(issueNumber);

              if (!existing || hasNewApprovalSet) {
                const mentions = notifyUsers.map((user) => `@${user}`).join(" ");
                await github.rest.issues.createComment({
                  owner,
                  repo,
                  issue_number: issueNumber,
                  body: [
                    `<!-- schoolpilot-soc2-approval-notification ${approvalFingerprint(body) || "none"} -->`,
                    `${mentions} SOC 2 approvals are pending.`,
                    "",
                    `- Pending approvals: ${approvalsPending}`,
                    `- Queue ID: ${queueId(body)}`,
                    `- Workflow run: ${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`,
                    "",
                    "Review the issue body, then comment with `/approve APPROVAL-ID rationale` or `/reject APPROVAL-ID rationale`.",
                  ].join("\n").trim(),
                });
                core.info(`Posted SOC 2 approval notification on issue #${issueNumber}`);
              } else {
                core.info("SOC 2 approval issue already has the same pending approval set; notification comment skipped.");
              }
            } else {
              await removePendingLabel(issueNumber);
              core.info("No pending SOC 2 approvals; pending label removed if present.");
            }

      - name: Upload SOC 2 approval queue
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: soc2-approval-queue
          path: soc2-evidence/approvals/
          if-no-files-found: error

      - name: Upload SOC 2 private evidence readiness
        if: always() && github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: soc2-private-evidence-readiness
          path: soc2-evidence/private-readiness/
          if-no-files-found: error

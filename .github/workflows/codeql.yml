name: CodeQL

# Free CodeQL static analysis (SAST) for JavaScript/TypeScript.
# NOTE: this repo is private on a plan without code scanning, so results can
# NOT be uploaded to the Security tab. Instead, the "Fail on findings" step
# parses the SARIF locally and FAILS the job if any error- or warning-severity
# finding exists. Findings print in the job log.
# SOC 2 evidence: "we run continuous SAST and block on findings".

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1' # Mondays 06:00 UTC

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read

    strategy:
      fail-fast: false
      matrix:
        language: ['javascript-typescript']

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          queries: security-extended

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"
          upload: never
          output: codeql-results

      - name: Fail on findings (error/warning severity)
        run: |
          total=0
          for f in codeql-results/*.sarif; do
            n=$(jq '[.runs[].results[]? | select((.level // "warning") | IN("error","warning"))] | length' "$f")
            if [ "$n" -gt 0 ]; then
              echo "::error::$n CodeQL finding(s) in $f"
              jq -r '.runs[].results[]? | select((.level // "warning") | IN("error","warning"))
                | "\(.level // "warning"): \(.ruleId) at \(.locations[0].physicalLocation.artifactLocation.uri):\(.locations[0].physicalLocation.region.startLine // 0)\n  \(.message.text)"' "$f"
            fi
            total=$((total + n))
          done
          echo "Total error/warning findings: $total"
          [ "$total" -eq 0 ]
